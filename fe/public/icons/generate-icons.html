<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Icon Generator</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .preview-container {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .icon-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        canvas {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }
        button {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #16a34a;
        }
        .actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>FinTrack Icon Generator</h1>
    <p>Tạo icon tạm thời: Nền Navy (#0f1f3d) + Chữ "FT" Xanh lá (#22c55e)</p>

    <div class="preview-container">
        <div class="icon-box">
            <canvas id="canvas192" width="192" height="192"></canvas>
            <span>192x192</span>
        </div>
        <div class="icon-box">
            <canvas id="canvas512" width="512" height="512" style="width: 192px; height: 192px;"></canvas>
            <span>512x512</span>
        </div>
        <div class="icon-box">
            <canvas id="canvas180" width="180" height="180"></canvas>
            <span>180x180 (iOS)</span>
        </div>
    </div>

    <div class="actions">
        <button onclick="downloadIcon(192)">Download 192x192</button>
        <button onclick="downloadIcon(512)">Download 512x512</button>
        <button onclick="downloadIcon(180)">Download 180x180</button>
    </div>

    <script>
        const BG_COLOR = '#0f1f3d';
        const TEXT_COLOR = '#22c55e';
        const TEXT = 'FM';

        // Hàm vẽ icon lên canvas preview
        function drawIcon(canvasId, size) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            // Vẽ nền navy
            ctx.fillStyle = BG_COLOR;
            ctx.fillRect(0, 0, size, size);

            // Vẽ chữ FT
            ctx.fillStyle = TEXT_COLOR;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Cỡ chữ bằng 40% kích thước canvas để trông đẹp
            const fontSize = Math.floor(size * 0.4);
            ctx.font = `bold ${fontSize}px Arial, sans-serif`;
            
            ctx.fillText(TEXT, size / 2, size / 2);
        }

        // Hàm tạo file ẩn, vẽ lại và tự động download
        function downloadIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Vẽ lại nền
            ctx.fillStyle = BG_COLOR;
            ctx.fillRect(0, 0, size, size);

            // Vẽ lại chữ
            ctx.fillStyle = TEXT_COLOR;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const fontSize = Math.floor(size * 0.4);
            ctx.font = `bold ${fontSize}px Arial, sans-serif`;
            ctx.fillText(TEXT, size / 2, size / 2);

            // Tạo link download ảo
            const link = document.createElement('a');
            link.download = `icon-${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Chạy vẽ preview khi mở trang
        drawIcon('canvas192', 192);
        drawIcon('canvas512', 512);
        drawIcon('canvas180', 180);
    </script>
</body>
</html>
